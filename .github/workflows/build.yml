name: Build APK

# Baut bei jedem Push auf main automatisch eine installierbare Android-APK
# und legt sie als Download-Artefakt ab. Manuell startbar über "Run workflow".
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java (17) einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Android-Projekt erzeugen
        run: npx cap add android

      - name: Kamera-Berechtigung eintragen (für Live-Modus)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.CAMERA' "$M"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n\n    <application#' "$M"
          fi
          echo "----- AndroidManifest.xml -----"
          cat "$M"

      - name: APK bauen
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK umbenennen
        run: cp android/app/build/outputs/apk/debug/app-debug.apk StahlZaehler.apk

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: StahlZaehler-APK
          path: StahlZaehler.apk
          if-no-files-found: error
